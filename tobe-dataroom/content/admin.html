<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Tobe Energy — Data Room Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.5;
    padding: 24px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { color: #10B981; margin-bottom: 8px; font-size: 24px; }
  .subtitle { color: #666; margin-bottom: 32px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid #222; padding-bottom: 16px; }
  .tab { background: #1a1a1a; border: 1px solid #333; color: #999; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .tab:hover { border-color: #10B981; color: #10B981; }
  .tab.active { background: #10B981; color: #000; border-color: #10B981; }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h3 { color: #10B981; margin-bottom: 12px; font-size: 16px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; }
  th { color: #666; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { font-size: 14px; }
  .empty { color: #666; font-style: italic; padding: 40px; text-align: center; }
  input, select { background: #1a1a1a; border: 1px solid #333; color: #e5e5e5; padding: 10px 14px; border-radius: 6px; font-size: 14px; width: 100%; }
  input:focus, select:focus { outline: none; border-color: #10B981; }
  button { background: #10B981; color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
  button:hover { background: #0d9668; }
  button.danger { background: #ef4444; color: #fff; }
  button.danger:hover { background: #dc2626; }
  button.secondary { background: #333; color: #e5e5e5; }
  button.secondary:hover { background: #444; }
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .form-row input { flex: 1; }
  .file-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #1a1a1a; border-radius: 6px; margin-bottom: 8px; }
  .file-name { font-weight: 500; }
  .file-meta { color: #666; font-size: 12px; }
  .file-actions { display: flex; gap: 8px; }
  .upload-zone { border: 2px dashed #333; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover { border-color: #10B981; background: rgba(16, 185, 129, 0.05); }
  .upload-zone.dragover { border-color: #10B981; background: rgba(16, 185, 129, 0.1); }
  .invite-code { font-family: monospace; background: #1a1a1a; padding: 8px 12px; border-radius: 4px; display: inline-block; }
  .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; text-transform: uppercase; }
  .badge.active { background: rgba(16, 185, 129, 0.2); color: #10B981; }
  .badge.expired { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  .logout { position: absolute; top: 24px; right: 24px; }
  #upload-input { display: none; }
  .loading { opacity: 0.5; pointer-events: none; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #10B981; color: #000; padding: 12px 20px; border-radius: 6px; font-weight: 500; display: none; }
  .toast.error { background: #ef4444; color: #fff; }
  .toast.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <a href="/api/logout" class="logout"><button class="secondary">Logout</button></a>
  <h1>⚡ Tobe Energy Data Room</h1>
  <p class="subtitle">Admin Dashboard</p>

  <div class="tabs">
    <div class="tab active" data-panel="files">Files</div>
    <div class="tab" data-panel="access">Access</div>
    <div class="tab" data-panel="invites">Invite Links</div>
  </div>

  <!-- FILES PANEL -->
  <div id="files" class="panel active">
    <div class="card">
      <h3>Upload Files</h3>
      <div class="upload-zone" id="upload-zone">
        <p>Drop files here or click to upload</p>
        <p style="color: #666; font-size: 12px; margin-top: 8px;">Supported: PDF, Excel, Word, Images, Videos</p>
      </div>
      <input type="file" id="upload-input" multiple>
      <div class="form-row" style="margin-top: 12px;">
        <input type="text" id="upload-folder" placeholder="Folder (e.g., /Financials)" value="/">
      </div>
    </div>
    <div class="card">
      <h3>Files</h3>
      <div id="files-list"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <!-- ACCESS PANEL -->
  <div id="access" class="panel">
    <div class="card">
      <h3>Grant Access</h3>
      <div class="form-row">
        <input type="email" id="access-email" placeholder="investor@example.com">
        <button onclick="grantAccess()">Grant Access</button>
      </div>
    </div>
    <div class="card">
      <h3>Users with Access</h3>
      <div id="access-list"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <!-- INVITES PANEL -->
  <div id="invites" class="panel">
    <div class="card">
      <h3>Create Invite Link</h3>
      <div class="form-row">
        <input type="text" id="invite-label" placeholder="Label (e.g., Series A Investors)">
        <input type="number" id="invite-max-uses" placeholder="Max uses (blank = unlimited)" style="max-width: 200px;">
        <button onclick="createInvite()">Create Link</button>
      </div>
    </div>
    <div class="card">
      <h3>Active Invites</h3>
      <div id="invites-list"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
  });
});

// Toast
function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// Format bytes
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

// FILES
async function loadFiles() {
  const res = await fetch('/api/admin/data-room-files');
  if (!res.ok) return;
  const files = await res.json();
  const list = document.getElementById('files-list');
  if (!files.length) {
    list.innerHTML = '<div class="empty">No files uploaded yet</div>';
    return;
  }
  list.innerHTML = files.map(f => `
    <div class="file-item">
      <div>
        <div class="file-name">${f.name}</div>
        <div class="file-meta">${f.folder} · ${formatBytes(f.size_bytes)} · ${new Date(f.created_at).toLocaleDateString()}</div>
      </div>
      <div class="file-actions">
        <button class="danger" onclick="deleteFile(${f.id}, '${f.name}')">Delete</button>
      </div>
    </div>
  `).join('');
}

async function deleteFile(id, name) {
  if (!confirm('Delete ' + name + '?')) return;
  const res = await fetch('/api/admin/data-room-files', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  if (res.ok) { toast('File deleted'); loadFiles(); }
  else toast('Failed to delete', true);
}

// Upload
const uploadZone = document.getElementById('upload-zone');
const uploadInput = document.getElementById('upload-input');

uploadZone.addEventListener('click', () => uploadInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  uploadFiles(e.dataTransfer.files);
});
uploadInput.addEventListener('change', e => uploadFiles(e.target.files));

async function uploadFiles(files) {
  const folder = document.getElementById('upload-folder').value || '/';
  for (const file of files) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('folder', folder);
    uploadZone.innerHTML = '<p>Uploading ' + file.name + '...</p>';
    const res = await fetch('/api/admin/data-room-upload', { method: 'POST', body: formData });
    if (!res.ok) { toast('Failed to upload ' + file.name, true); }
  }
  uploadZone.innerHTML = '<p>Drop files here or click to upload</p><p style="color: #666; font-size: 12px; margin-top: 8px;">Supported: PDF, Excel, Word, Images, Videos</p>';
  toast('Upload complete');
  loadFiles();
}

// ACCESS
async function loadAccess() {
  const res = await fetch('/api/admin/data-room-access');
  if (!res.ok) return;
  const users = await res.json();
  const list = document.getElementById('access-list');
  if (!users.length) {
    list.innerHTML = '<div class="empty">No users have access yet</div>';
    return;
  }
  list.innerHTML = '<table><thead><tr><th>Email</th><th>Granted</th><th>Actions</th></tr></thead><tbody>' +
    users.map(u => `<tr>
      <td>${u.email}</td>
      <td>${new Date(u.created_at).toLocaleDateString()}</td>
      <td><button class="danger" onclick="revokeAccess(${u.id}, '${u.email}')">Revoke</button></td>
    </tr>`).join('') + '</tbody></table>';
}

async function grantAccess() {
  const email = document.getElementById('access-email').value.trim();
  if (!email) return;
  const res = await fetch('/api/admin/data-room-access', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });
  if (res.ok) { toast('Access granted'); document.getElementById('access-email').value = ''; loadAccess(); }
  else toast('Failed to grant access', true);
}

async function revokeAccess(id, email) {
  if (!confirm('Revoke access for ' + email + '?')) return;
  const res = await fetch('/api/admin/data-room-access', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  if (res.ok) { toast('Access revoked'); loadAccess(); }
  else toast('Failed to revoke', true);
}

// INVITES
async function loadInvites() {
  const res = await fetch('/api/admin/invite-links');
  if (!res.ok) return;
  const invites = await res.json();
  const list = document.getElementById('invites-list');
  if (!invites.length) {
    list.innerHTML = '<div class="empty">No invite links created yet</div>';
    return;
  }
  list.innerHTML = '<table><thead><tr><th>Code</th><th>Label</th><th>Uses</th><th>Actions</th></tr></thead><tbody>' +
    invites.map(i => `<tr>
      <td><span class="invite-code">${location.origin}/join?code=${i.code}</span></td>
      <td>${i.label || '—'}</td>
      <td>${i.use_count}${i.max_uses ? '/' + i.max_uses : ''}</td>
      <td><button class="secondary" onclick="copyInvite('${i.code}')">Copy</button> <button class="danger" onclick="deleteInvite(${i.id})">Delete</button></td>
    </tr>`).join('') + '</tbody></table>';
}

async function createInvite() {
  const label = document.getElementById('invite-label').value.trim();
  const maxUses = document.getElementById('invite-max-uses').value || null;
  const res = await fetch('/api/admin/invite-links', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label, max_uses: maxUses ? parseInt(maxUses) : null })
  });
  if (res.ok) { toast('Invite created'); document.getElementById('invite-label').value = ''; document.getElementById('invite-max-uses').value = ''; loadInvites(); }
  else toast('Failed to create invite', true);
}

function copyInvite(code) {
  navigator.clipboard.writeText(location.origin + '/join?code=' + code);
  toast('Copied to clipboard');
}

async function deleteInvite(id) {
  if (!confirm('Delete this invite link?')) return;
  const res = await fetch('/api/admin/invite-links', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  if (res.ok) { toast('Invite deleted'); loadInvites(); }
  else toast('Failed to delete', true);
}

// Init
loadFiles();
loadAccess();
loadInvites();
</script>
</body>
</html>
